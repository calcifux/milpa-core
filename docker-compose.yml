# Docker solo levanta INFRAESTRUCTURA. La app (FastAPI, Celery worker/beat)
# corre en el HOST con uv. La MariaDB es tu contenedor aparte (factorqa052026).
#
#   docker compose up -d        # levanta redis + rabbitmq + mailpit
#   Mailpit UI:    http://localhost:8025
#   RabbitMQ UI:   http://localhost:15672  (guest/guest)
name: milpa-framework

services:
  redis:
    image: redis:7-alpine
    container_name: milpa-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # Broker MQ alternativo (broker-agnostic): para probar BROKER_URL=amqp://...
  # Es el broker de referencia de Celery. ActiveMQ NO es compatible (AMQP 1.0);
  # por eso el "MQ local" es RabbitMQ.
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: milpa-rabbitmq
    ports:
      - "5672:5672"     # AMQP (BROKER_URL=amqp://guest:guest@localhost:5672//)
      - "15672:15672"   # management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: milpa-mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"  # SMTP (la app envía aquí)
      - "${MAILPIT_UI_PORT:-8025}:8025"    # interfaz web para ver correos
    restart: unless-stopped

volumes:
  redis-data:
