site_name: milpa
site_description: >-
  Microframework Python (FastAPI + Celery + SQLAlchemy + Typer) estilo Laravel/Spring,
  para construir monolitos modulares y migrar apps legacy de Laravel.
site_author: "@Calcifux"
repo_url: https://github.com/calcifux/milpa
repo_name: calcifux/milpa
copyright: "milpa · MIT"

# El sitio se construye desde la guía en documentation/ (los ADRs de docs/ no se publican).
docs_dir: documentation

theme:
  name: material
  language: es
  icon:
    logo: material/corn
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    # Forge (StackCraft) como acento; toggle claro/oscuro.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Cambiar a oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Cambiar a claro

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details

nav:
  - Inicio: README.md
  - Primeros pasos:
      - Introducción: 01-introduccion.md
      - Instalación: 02-instalacion.md
      - Configuración: 03-configuracion.md
      - Estructura de directorios: 04-estructura-directorios.md
      - Ciclo de vida: 05-ciclo-de-vida.md
  - Arquitectura:
      - Monolito modular: 06-monolito-modular.md
      - Errores y RFC 9457: 28-errores-y-rfc9457.md
  - Patrones (estilo milpa):
      - Eventos y Observers: 19-eventos-y-observers.md
      - Mediator (command bus): 20-mediator.md
      - Pipeline: 21-pipeline.md
  - HTTP:
      - Rutas y controladores: 07-rutas-y-controladores.md
      - Versionado de la API: 23-versionado-api.md
      - Rate limiting: 24-rate-limiting.md
      - Vistas: 09-vistas.md
      - Negociación de contenido: 26-negociacion-de-contenido.md
      - Serializadores: 27-serializadores.md
      - Autenticación y autorización: 15-autenticacion.md
  - Frontend:
      - Vite y assets: 29-vite-y-assets.md
      - Microfrontends (surcos): 30-microfrontends-surcos.md
      - PWA: 31-pwa.md
  - Consola:
      - jornal: 08-consola-jornal.md
  - Datos:
      - Base de datos: 16-base-de-datos.md
      - Modelos: 17-modelos.md
      - Repositorios y transacciones: 18-repositorios-y-transacciones.md
      - Filtrado y paginación: 25-filtrado-y-paginacion.md
  - Background:
      - Jobs (@job): 22-jobs.md
      - Colas y tareas: 11-colas-y-tareas.md
      - Programación (cron): 12-programacion-cron.md
  - Más:
      - Correo: 10-correo.md
      - Localización (i18n): 13-localizacion-i18n.md
      - Logging: 14-logging.md
      - Lazy imports y scan: 32-lazy-y-scan.md
      - Estabilidad y versionado: 33-estabilidad-y-versionado.md
